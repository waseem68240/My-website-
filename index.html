<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* 🌌 Global Styles */
  * { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins',sans-serif; }
  body {
    min-height:100vh;
    display:flex; justify-content:center; align-items:center;
    background: linear-gradient(135deg, #6a0dad, #1e90ff);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow-x:hidden;
  }
  @keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* ✨ Glassmorphism Container */
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    padding: 30px;
    max-width: 500px;
    width: 90%;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation: fadeIn 1s ease;
  }
  @keyframes fadeIn {
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
  }

  h1 {
    font-weight:600;
    margin-bottom:20px;
    text-align:center;
    text-shadow: 0 0 10px #fff, 0 0 20px #6a0dad, 0 0 30px #1e90ff;
  }

  input {
    width:100%;
    padding:12px 15px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
    outline:none;
    transition:0.3s;
  }
  input:focus { background: rgba(255,255,255,0.2); }

  button {
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background: #6a0dad;
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow: 0 0 10px #6a0dad, 0 0 20px #1e90ff;
    transition:0.3s;
    position:relative;
    overflow:hidden;
  }
  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #fff, 0 0 30px #6a0dad, 0 0 40px #1e90ff;
  }
  button:disabled {
    opacity:0.5;
    cursor:not-allowed;
  }

  .status { margin:15px 0; font-style:italic; }

  canvas {
    margin-top:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
  }

  .download-btn {
    margin-top:15px;
    display:none;
  }

  .typing-text {
    display:inline-block;
    border-right:2px solid white;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,50%,100%{border-color:white;} 25%,75%{border-color:transparent;} }

</style>
</head>
<body>
<div class="container">
  <h1>AI Video Generator</h1>
  <input type="text" id="prompt" placeholder="Enter your video prompt...">
  <button id="generateBtn">Generate Video</button>
  <div class="status" id="status"></div>
  <canvas id="videoCanvas" width="720" height="1280"></canvas>
  <button id="downloadBtn" class="download-btn">Download Video</button>
  <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
</div>

<script>
const generateBtn = document.getElementById('generateBtn');
const status = document.getElementById('status');
const canvas = document.getElementById('videoCanvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');
const bgMusic = document.getElementById('bgMusic');

generateBtn.addEventListener('click', async () => {
  const prompt = document.getElementById('prompt').value.trim();
  if(!prompt) return alert("Please enter a prompt!");
  
  generateBtn.disabled = true;
  status.innerHTML = '<span class="typing-text">Generating AI Video...</span>';
  downloadBtn.style.display = 'none';
  
  // Start background music
  bgMusic.volume = 0.1;
  bgMusic.play();

  // Split prompt into 3-5 scenes
  const scenes = prompt.split('.').filter(s=>s.trim()).slice(0,5);
  const sceneDuration = 3000; // 3 sec per scene

  // Speech Synthesis
  const utterance = new SpeechSynthesisUtterance(prompt);
  utterance.rate = 1;
  speechSynthesis.speak(utterance);

  // MediaRecorder
  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream);
  let chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  // Draw scenes
  for(let i=0; i<scenes.length; i++){
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = `https://picsum.photos/720/1280?random=${i+1}`;
    await new Promise(res=>img.onload=res);

    // Animate fade + zoom
    const start = performance.now();
    await new Promise(res=>{
      function animate(t){
        let progress = (t - start)/sceneDuration;
        if(progress>1) progress=1;
        ctx.globalAlpha = progress; // fade in
        const scale = 1 + 0.1*progress; // zoom
        ctx.setTransform(scale,0,0,scale,canvas.width/2*(1-scale),canvas.height/2*(1-scale));
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        // Text overlay
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle="white";
        ctx.font="bold 60px Poppins";
        ctx.textAlign="center";
        ctx.fillText(scenes[i],canvas.width/2,100);
        if(progress<1) requestAnimationFrame(animate);
        else res();
      }
      animate(start);
    });
  }

  recorder.stop();
  recorder.onstop = e => {
    const blob = new Blob(chunks,{type:'video/webm'});
    const url = URL.createObjectURL(blob);
    downloadBtn.href = url;
    downloadBtn.download = "AI_Video.webm";
    downloadBtn.style.display = 'inline-block';
    status.innerText = 'Video Generated Successfully!';
    generateBtn.disabled = false;
    bgMusic.pause();
  }
});
</script>
</body>
    </html>
