<!DOCTYPE html>
<html>
<head>
<title>AI Caption Generator</title>

<style>
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  padding: 50px;
}

.container {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
  width: 80%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

#output {
  margin-top: 20px;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="container">
  <h1>✨ AI Caption Generator</h1>

  <input type="text" id="inputText" placeholder="Type something..." />
  <br>

  <button onclick="generate()">Generate Caption</button>

  <p id="output"></p>
</div>

<script>
function generate() {
  let text = document.getElementById("inputText").value;

  let captions = [
    "✨ " + text + " is amazing!",
    "🔥 Loving this vibe!",
    "💖 Feeling great today!",
    "😎 Confidence level: 100%",
    "🌟 Living my best life!"
  ];

  document.getElementById("output").innerHTML = captions.join("<br>");
}
</script>

</body>
